<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roteiro · Planejador de Roteiros</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F7F9; --panel:#FFFFFF; --ink:#16202C; --slate:#5B6472; --faint:#8B93A1;
    --line:#E6E9EE; --line-soft:#EEF1F5; --teal:#0F766E; --terra:#E07A3F;
    --shadow:0 10px 30px -14px rgba(22,32,44,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"IBM Plex Sans",system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(1000px 500px at 100% -5%, rgba(15,118,110,.05), transparent 60%), var(--bg);
    -webkit-font-smoothing:antialiased;line-height:1.55;padding:46px 22px 80px}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace}
  .wrap{max-width:920px;margin:0 auto}
  a{color:var(--teal)}

  /* HEADER */
  header{margin-bottom:8px}
  .brandline{display:flex;align-items:center;gap:9px;font-family:"JetBrains Mono",monospace;
    font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);margin-bottom:14px}
  .brandline .dot{width:7px;height:7px;border-radius:50%;background:var(--terra)}
  h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:clamp(30px,5vw,46px);
    letter-spacing:-.025em;line-height:1.02}
  h1 .hl{color:var(--teal)}
  .sub{color:var(--slate);font-size:16px;margin-top:14px;max-width:640px}
  .sub b{color:var(--ink)}

  /* toggle bar (sticky) */
  .bar{position:sticky;top:14px;z-index:20;display:flex;flex-wrap:wrap;gap:14px;align-items:center;
    justify-content:space-between;background:rgba(255,255,255,.86);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:14px;padding:12px 16px;margin:26px 0 10px;box-shadow:var(--shadow)}

  /* roteiro selector */
  .rotpick{display:flex;align-items:center;gap:9px;flex:1 1 240px;min-width:200px}
  .rotpick .lab{font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--faint);flex-shrink:0}
  .rotpick select{flex:1;font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:14px;color:var(--ink);
    background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:9px 30px 9px 12px;cursor:pointer;
    appearance:none;-webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235B6472' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat;background-position:right 9px center;background-size:15px}
  .rotpick select:focus{outline:none;border-color:var(--teal)}
  .vartoggle{display:flex;gap:6px;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:5px}
  .vartoggle button{font-size:12.5px;font-weight:600;color:var(--slate);background:transparent;border:0;
    border-radius:8px;padding:8px 14px;cursor:pointer;transition:all .18s}
  .vartoggle button.on{background:var(--panel);color:var(--teal);box-shadow:0 1px 4px rgba(22,32,44,.12)}
  .barstats{display:flex;gap:18px;font-family:"JetBrains Mono",monospace;font-size:11.5px;color:var(--slate)}
  .barstats b{color:var(--ink)}
  .barlink{font-size:12.5px;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
  .barlink svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

  /* season tip */
  .seasontip{display:flex;gap:13px;align-items:flex-start;background:#fff;border:1px solid var(--line);
    border-left:3px solid var(--terra);border-radius:12px;padding:16px 18px;margin:18px 0 30px}
  .seasontip svg{width:20px;height:20px;stroke:var(--terra);fill:none;stroke-width:1.9;flex-shrink:0;margin-top:1px}
  .seasontip h4{font-family:"Space Grotesk",sans-serif;font-size:15px;margin-bottom:3px}
  .seasontip p{font-size:13px;color:var(--slate)}
  .seasontip b{color:var(--ink)}

  /* localização */
  .georow{margin:-14px 0 30px}
  .geobtn{display:flex;align-items:center;gap:9px;width:100%;cursor:pointer;
    font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:13.5px;color:var(--ink);
    background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 16px;transition:all .15s}
  .geobtn:hover{border-color:var(--terra);color:var(--terra)}
  .geobtn svg{width:18px;height:18px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2;stroke-linejoin:round}
  .geobtn.on{background:var(--terra);border-color:var(--terra);color:#fff}
  .geobtn.busy{opacity:.6;pointer-events:none}
  .geoinfo{display:flex;flex-direction:column;gap:9px;margin-top:11px}
  .geoinfo .gi{display:flex;align-items:center;gap:10px;font-family:"IBM Plex Sans",sans-serif;font-size:13.5px;color:var(--ink)}
  .geoinfo .gi .gdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .geoinfo .gi .glbl{color:var(--slate)}
  .geoinfo .gi .gnm{font-weight:600}
  .geoinfo .gi .gkm{margin-left:auto;font-family:"JetBrains Mono",monospace;font-weight:500;white-space:nowrap}
  @media print{ .georow{display:none !important} }

  /* month */
  .month{margin-top:40px}
  .month-h{display:flex;align-items:baseline;gap:14px;margin-bottom:8px;
    padding-bottom:12px;border-bottom:1.5px solid var(--ink)}
  .month-h .mname{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:26px;letter-spacing:-.01em}
  .month-h .mphase{font-size:13px;color:var(--slate)}
  .month-h .mkm{margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:11.5px;color:var(--terra)}

  /* week card */
  .week{display:grid;grid-template-columns:78px 1fr;gap:18px;padding:22px 0;border-bottom:1px solid var(--line)}
  .week.hidden{display:none}
  .wk-side{display:flex;flex-direction:column;gap:6px}
  .wk-num{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:30px;color:var(--ink);line-height:1}
  .wk-num .s{font-size:12px;color:var(--faint);font-weight:500;display:block;letter-spacing:.04em}
  .wk-dates{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--faint);line-height:1.3}
  .wk-fase{width:11px;height:11px;border-radius:3px;margin-top:2px}

  .wk-body .wk-trecho{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:5px}
  .wk-trecho .from,.wk-trecho .to{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:17px}
  .wk-trecho .arr{color:var(--terra);font-weight:700}
  .wk-trecho .km{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--faint);
    background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:2px 9px;margin-left:4px}
  .wk-region{font-size:12px;color:var(--slate);margin-bottom:12px}
  .wk-desc{font-size:13.5px;color:var(--ink);margin-bottom:14px}
  .wk-desc b{color:var(--ink)}

  .wk-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .chip{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--slate);
    background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:7px 11px}
  .chip .d{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .chip b{color:var(--ink);font-weight:600}

  .wk-rows{display:flex;flex-direction:column;gap:7px}
  .wkrow{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;color:var(--slate)}
  .wkrow .lab{font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;
    color:var(--faint);flex-shrink:0;width:74px;margin-top:2px}
  .wkrow .val{color:var(--ink)}
  .wkrow .val b{color:var(--teal);font-weight:600}
  .wkrow.r-parque .lab{color:#2E9E5B}
  .wkrow.r-comer .lab{color:var(--terra)}

  .opt{margin-top:12px;font-size:12px;color:var(--terra);background:rgba(224,122,63,.07);
    border:1px solid rgba(224,122,63,.25);border-radius:9px;padding:9px 12px;display:flex;gap:8px}
  .opt .t{font-weight:700;flex-shrink:0}

  footer{margin-top:54px;padding-top:22px;border-top:1px solid var(--line);
    font-family:"JetBrains Mono",monospace;font-size:11.5px;color:var(--faint);display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}

  @media(max-width:620px){
    .week{grid-template-columns:1fr;gap:10px}
    .wk-side{flex-direction:row;align-items:center;gap:12px}
  }
  .bar button.barlink{background:none;border:0;cursor:pointer;font-family:inherit}
  @media print{
    body{padding:0;background:#fff}
    .bar,.barlink,header a{display:none !important}
    .seasontip{break-inside:avoid}
    .week{break-inside:avoid}
    .month{break-inside:avoid-page}
    h1{font-size:30px}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <a href="app.html" style="display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--slate);text-decoration:none;margin-bottom:18px"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>Voltar ao app</a>
    <div class="brandline"><span class="dot"></span><span id="brandPeriod">roteiro semanal</span></div>
    <h1 id="rotName">Roteiro</h1>
    <p class="sub" id="rotResumo"></p>
  </header>

  <div class="bar">
    <div class="rotpick">
      <span class="lab">Roteiro</span>
      <select id="rotsel" aria-label="Selecionar roteiro"></select>
    </div>
    <div class="vartoggle" id="vartoggle">
      <button data-var="completa" class="on">Rota Completa</button>
      <button data-var="essencial">Rota Essencial</button>
    </div>
    <div class="barstats">
      <span>semanas <b id="stWeeks">17</b></span>
      <span>distância <b id="stKm">≈16.500 km</b></span>
    </div>
    <a class="barlink" href="mapa.html"><svg viewBox="0 0 24 24"><path d="M9 3 3 6v15l6-3 6 3 6-3V3l-6 3-6-3z"/><path d="M9 3v15M15 6v15"/></svg>Ver no mapa</a>
    <a class="barlink" id="diaadiaBtn" href="#" target="_blank" rel="noopener" style="display:none"><svg viewBox="0 0 24 24"><path d="M8 2v3M16 2v3M3 9h18M5 5h14a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1zM8 13h2M8 17h2M14 13h2"/></svg>Roteiro dia a dia</a>
    <button class="barlink" id="exportBtn" type="button"><svg viewBox="0 0 24 24"><path d="M12 3v12M8 11l4 4 4-4M4 21h16"/></svg>Exportar PDF</button>
  </div>

  <div class="seasontip">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9 17 7M7 17l-2.1 2.1"/></svg>
    <div>
      <h4 id="tipH"></h4>
      <p id="tipP"></p>
    </div>
  </div>

  <div class="georow" id="georow">
    <button class="geobtn" id="geobtn" type="button">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.25 8 12 8 12s8-6.75 8-12a8 8 0 0 0-8-8z"/></svg>
      <span id="geolabel">Onde estou em relação a este roteiro?</span>
    </button>
    <div class="geoinfo" id="geoinfo" hidden></div>
  </div>

  <div id="months"></div>

  <footer>
    <span>// planejador de roteiros · roteiro de planejamento</span>
    <span>datas e distâncias aproximadas</span>
  </footer>

</div>

<script src="dados.js"></script>
<script src="roteiros.js"></script>
<script src="app-shared.js"></script>
<script>
(function(){
  const ROTEIROS = window.ROTEIROS;
  const C = { camping:"#2E9E5B", wild:"#D97706", apoio:"#2563EB", cidade:"#475569" };

  /* ---- escolher roteiro por ?r= ---- */
  const params = new URLSearchParams(location.search);
  let current = ROTEIROS.find(r=>r.id===(params.get('r')||localStorage.getItem('roteiroAtivo'))) || ROTEIROS[0];
  try{ localStorage.setItem('roteiroAtivo', current.id); }catch(e){}
  try{ if(window.PLANNER) PLANNER.applyTheme(current); }catch(e){}
  let varMode = 'completa';

  /* popular seletor */
  const sel = document.getElementById('rotsel');
  ROTEIROS.forEach(r=>{
    const o=document.createElement('option'); o.value=r.id;
    o.textContent=`${r.nome} \u00b7 ${r.semanas} sem`; if(r.id===current.id) o.selected=true;
    sel.appendChild(o);
  });
  sel.addEventListener('change', ()=>{
    const url=new URL(location.href); url.searchParams.set('r', sel.value);
    location.href=url.toString();
  });

  const cont = document.getElementById('months');

  function chip(label, color){
    const c = C[color] || color;
    return `<span class="chip"><span class="d" style="background:${c}"></span>${label}</span>`;
  }
  function pernoiteLabel(t){
    return ({camping:"Camping organizado", wild:"Wild camping (Wolf)", apoio:"Ponto de apoio", cidade:"Apoio urbano"})[t]||t;
  }
  function row(cls, lab, val){
    return `<div class="wkrow ${cls}"><span class="lab">${lab}</span><span class="val">${val}</span></div>`;
  }

  function applyHeader(){
    document.title = `${current.nome} \u00b7 Roteiro`;
    document.getElementById('brandPeriod').textContent = `roteiro semanal \u00b7 ${current.periodo.toLowerCase()}`;
    document.getElementById('rotName').innerHTML = current.nome.replace(/Carretera|Carretera Austral|Patag\u00f4nia/i, m=>`<span class="hl">${m}</span>`);
    document.getElementById('rotResumo').innerHTML = current.resumo;
    document.getElementById('tipH').textContent = current.seasonTip.h;
    document.getElementById('tipP').innerHTML = current.seasonTip.p;
    // guia "dia a dia" (para roteiros que têm um documento dedicado)
    var DIAADIA = { 'cu-havana-trinidad':'dia-a-dia-cuba.html', 'pe-cusco-machupicchu':'dia-a-dia-peru.html', 'cl-atacama':'dia-a-dia-atacama.html', 'patagonia-completa':'dia-a-dia-patagonia.html', 'cl-santiago-cordilheira':'dia-a-dia-santiago.html', 'bo-altiplano-uyuni':'dia-a-dia-bolivia.html', 'co-cafe-caribe':'dia-a-dia-colombia.html', 'ar-norte-salta':'dia-a-dia-argentina-salta.html', 'uy-costeiro':'dia-a-dia-uruguai.html', 'uy-colonia-vinhos':'dia-a-dia-uruguai.html', 'ec-andes-vulcoes':'dia-a-dia-equador.html', 've-gran-sabana':'dia-a-dia-venezuela.html', 've-andes-llanos':'dia-a-dia-venezuela.html', 'py-missoes-asuncion':'dia-a-dia-paraguai.html', 'py-chaco-menonitas':'dia-a-dia-paraguai.html', 'minas-cidades-historicas':'dia-a-dia-minas-historicas.html', 'ba-chapada-diamantina':'dia-a-dia-chapada-diamantina.html', 'rs-serra-gaucha':'dia-a-dia-serra-gaucha.html', 'sc-serra-catarinense':'dia-a-dia-serra-catarinense.html', 'sc-litoral':'dia-a-dia-litoral-catarinense.html', 'rs-canions-serra-geral':'dia-a-dia-canions-serra-geral.html', 'sc-vale-europeu':'dia-a-dia-vale-europeu.html', 'ms-pantanal-bonito':'dia-a-dia-pantanal-bonito.html', 'go-chapada-veadeiros':'dia-a-dia-chapada-veadeiros.html', 'mt-pantanal-norte':'dia-a-dia-pantanal-norte.html', 'minas-velho-chico':'dia-a-dia-velho-chico.html' };
    var dd = document.getElementById('diaadiaBtn');
    if(dd){ if(DIAADIA[current.id]){ dd.href = DIAADIA[current.id]; dd.style.display=''; } else { dd.style.display='none'; } }
  }

  function render(){
    cont.innerHTML='';
    const FASES = current.fases;
    let totalWeeks=0;
    current.order.forEach(mes=>{
      const weeks = current.weeks.filter(w=>w.mes===mes && !(varMode==="essencial" && w.completaOnly));
      if(!weeks.length) return;
      const mEl=document.createElement('div'); mEl.className='month';
      mEl.innerHTML = `<div class="month-h"><span class="mname">${mes}</span>
        <span class="mphase">${current.phaseMes[mes]||''}</span></div>`;
      weeks.forEach(w=>{
        totalWeeks++;
        const fase = FASES[w.fase] || {cor:'#94a3b8', nome:''};
        const focos = w.focos.map(f=>chip(f[0],f[1])).join('');
        const opt = (varMode==="completa" && w.optEss)
          ? `<div class="opt"><span class="t">Rota Essencial:</span><span>${w.optEss.replace(/^Essencial:\s*/,'').replace(/^Na Rota Essencial[^:]*:\s*/,'')}</span></div>`
          : '';
        let rows = row('', 'Pernoite', `<b>${pernoiteLabel(w.pernoite[0])}</b> \u00b7 ${w.pernoite[1]}`);
        if(w.parque) rows += row('r-parque','Parques', w.parque);
        if(w.comer)  rows += row('r-comer','Comer & beber', w.comer);
        rows += row('', 'Dica', w.dica);
        const el=document.createElement('div'); el.className='week';
        el.innerHTML = `
          <div class="wk-side">
            <div class="wk-num">${String(w.n).padStart(2,'0')}<span class="s">semana</span></div>
            <div class="wk-dates">${w.datas}</div>
            <div class="wk-fase" style="background:${fase.cor}" title="${fase.nome}"></div>
          </div>
          <div class="wk-body">
            <div class="wk-trecho"><span class="from">${w.from}</span><span class="arr">\u2192</span>
              <span class="to">${w.to}</span><span class="km">${w.km}</span></div>
            <div class="wk-region">${w.reg}</div>
            <div class="wk-desc">${w.desc}</div>
            <div class="wk-grid">${focos}</div>
            <div class="wk-rows">${rows}</div>
            ${opt}
          </div>`;
        mEl.appendChild(el);
      });
      cont.appendChild(mEl);
    });
    document.getElementById('stWeeks').textContent = totalWeeks;
    document.getElementById('stKm').textContent =
      varMode==="completa" ? current.distancia_completa : current.distancia_essencial;
  }

  document.querySelectorAll('#vartoggle button').forEach(b=>{
    b.onclick=()=>{
      document.querySelectorAll('#vartoggle button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on'); varMode=b.dataset.var; render();
      if(typeof clearGeo==='function') clearGeo();
    };
  });

  const _exp=document.getElementById('exportBtn'); if(_exp) _exp.onclick=()=>window.print();

  /* ---- minha localização (opt-in) ---- */
  function haversine(a, b){
    const R=6371, toR=x=>x*Math.PI/180;
    const dLat=toR(b[0]-a[0]), dLng=toR(b[1]-a[1]);
    const s=Math.sin(dLat/2)**2 + Math.cos(toR(a[0]))*Math.cos(toR(b[0]))*Math.sin(dLng/2)**2;
    return 2*R*Math.asin(Math.sqrt(s));
  }
  function fmtKm(km){ return km>=1000 ? (km/1000).toFixed(1).replace('.',',')+' mil km' : Math.round(km).toLocaleString('pt-BR')+' km'; }
  const geobtn=document.getElementById('geobtn'), geolabel=document.getElementById('geolabel'), geoinfo=document.getElementById('geoinfo');
  let geoActive=false;
  function routeWps(){
    const wp=(current.mapa&&current.mapa.wp)||[];
    return varMode==='essencial' ? wp.filter(p=>p.var==='both') : wp;
  }
  function clearGeo(){
    geoActive=false; geobtn.classList.remove('on');
    geolabel.textContent='Onde estou em relação a este roteiro?';
    geoinfo.hidden=true; geoinfo.innerHTML='';
  }
  function showGeo(lat,lng){
    const wp=routeWps(); if(!wp.length){ geolabel.textContent='Sem dados de mapa'; return; }
    const o = wp.find(p=>p.t==='origem') || wp.find(p=>p.hl) || wp[0];
    let near=null, nearKm=Infinity;
    wp.forEach(p=>{ const d=haversine([lat,lng],[p.lat,p.lng]); if(d<nearKm){ nearKm=d; near=p; } });
    const kmO = o ? haversine([lat,lng],[o.lat,o.lng]) : null;
    geoActive=true; geobtn.classList.add('on'); geolabel.textContent='Localização ativa — tocar p/ remover';
    let html='';
    if(o) html += `<div class="gi"><span class="gdot" style="background:#2563EB"></span>`+
      `<span class="glbl">até a origem</span> <span class="gnm">${o.n}</span><span class="gkm">${fmtKm(kmO)}</span></div>`;
    if(near && (!o||near.id!==o.id)) html += `<div class="gi"><span class="gdot" style="background:#15803D"></span>`+
      `<span class="glbl">destino + próximo</span> <span class="gnm">${near.n}</span><span class="gkm">${fmtKm(nearKm)}</span></div>`;
    html += `<div class="gi"><span class="gdot" style="background:transparent"></span>`+
      `<a class="glbl" style="margin-left:-20px;color:var(--terra);font-weight:600;text-decoration:none" href="mapa.html?r=${current.id}">ver no mapa →</a></div>`;
    geoinfo.innerHTML=html; geoinfo.hidden=false;
  }
  geobtn.onclick=()=>{
    if(geoActive){ clearGeo(); return; }
    if(!navigator.geolocation){ geolabel.textContent='Sem suporte a GPS'; return; }
    geobtn.classList.add('busy'); geolabel.textContent='Localizando…';
    navigator.geolocation.getCurrentPosition(
      pos=>{ geobtn.classList.remove('busy'); showGeo(pos.coords.latitude,pos.coords.longitude); },
      err=>{ geobtn.classList.remove('busy');
        geolabel.textContent = err.code===1 ? 'Permissão negada' : 'Não foi possível localizar';
        setTimeout(()=>{ if(!geoActive) geolabel.textContent='Onde estou em relação a este roteiro?'; }, 2600); },
      { enableHighAccuracy:true, timeout:10000, maximumAge:60000 }
    );
  };

  applyHeader();
  render();
})();
</script>
</body>
</html>
