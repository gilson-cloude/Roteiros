<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Roteiro por etapas · Planejador de Roteiros</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16202c; --slate:#566273; --faint:#8b93a1;
    --paper:#f3f5f8; --card:#ffffff; --line:#e3e8ef;
    --accent:#0F766E; --accent-d:#0c5a54;
    --shadow:0 14px 34px -20px rgba(20,40,60,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);font-family:"IBM Plex Sans",sans-serif;line-height:1.6}
  .wrap{max-width:880px;margin:0 auto;padding:40px 26px 70px}
  .hero{position:relative;background:linear-gradient(135deg,var(--accent),var(--accent-d));
    color:#fff;border-radius:22px;padding:34px 34px 28px;overflow:hidden;box-shadow:var(--shadow)}
  .hero .flag{display:inline-flex;gap:6px;align-items:center;font-family:"JetBrains Mono",monospace;font-size:11px;
    letter-spacing:.16em;text-transform:uppercase;opacity:.85;margin-bottom:14px}
  .hero .flag .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.85)}
  .hero h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:34px;line-height:1.05;letter-spacing:-.02em}
  .hero .sub{font-size:15px;opacity:.92;max-width:600px;margin-top:11px}
  .hero .facts{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
  .hero .fact{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);
    border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:6px 13px;font-size:12px;font-weight:500}
  .note{display:flex;gap:13px;align-items:flex-start;background:#fff;border:1px solid var(--line);
    border-left:4px solid var(--accent);border-radius:14px;padding:15px 17px;margin-top:18px;box-shadow:var(--shadow)}
  .note svg{width:21px;height:21px;flex-shrink:0;stroke:var(--accent);fill:none;stroke-width:1.8;margin-top:1px}
  .note h4{font-family:"Space Grotesk",sans-serif;font-size:13.5px;margin-bottom:3px}
  .note p{font-size:13px;color:var(--slate)}
  .day{display:flex;background:var(--card);border:1px solid var(--line);border-radius:16px;
    margin-top:16px;box-shadow:var(--shadow);overflow:hidden}
  .day .rail{flex-shrink:0;width:78px;background:linear-gradient(165deg,var(--accent),var(--accent-d));
    color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:17px 8px;gap:3px}
  .day .rail .dn{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.1em;opacity:.85}
  .day .rail .dnum{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:26px;line-height:1}
  .day .rail .dwk{font-size:9.5px;opacity:.8;margin-top:2px;text-align:center}
  .day .body{flex:1;padding:17px 19px 18px;min-width:0}
  .day .loc{display:flex;align-items:center;gap:7px;font-family:"JetBrains Mono",monospace;font-size:11px;
    letter-spacing:.04em;color:var(--accent-d);text-transform:uppercase;font-weight:500;flex-wrap:wrap}
  .day .loc svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
  .day .move{margin-left:auto;text-transform:none;letter-spacing:0;color:var(--faint);font-size:11px}
  .day h3{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:18px;margin:6px 0 7px}
  .day p{font-size:14px;color:#2c3848}
  .day p b{color:var(--ink);font-weight:600}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
  .chip{font-size:11.5px;font-weight:600;font-family:"Space Grotesk",sans-serif;color:var(--accent-d);
    background:color-mix(in srgb,var(--accent) 10%,#fff);border:1px solid color-mix(in srgb,var(--accent) 24%,#fff);border-radius:999px;padding:4px 10px}
  .meta{display:flex;flex-wrap:wrap;gap:7px 22px;margin-top:13px;padding-top:13px;border-top:1px dashed var(--line)}
  .meta div{display:flex;align-items:flex-start;gap:7px;font-size:12.5px;color:var(--slate);min-width:0}
  .meta b{color:var(--ink);font-weight:600;font-family:"Space Grotesk",sans-serif}
  .foot{text-align:center;margin-top:32px;font-size:12px;color:var(--faint);font-family:"JetBrains Mono",monospace}
  .backapp{position:fixed;left:16px;bottom:16px;z-index:999;display:inline-flex;align-items:center;gap:8px;
    text-decoration:none;font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:14px;color:#fff;
    background:#1b2430;border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:11px 18px 11px 15px;
    box-shadow:0 10px 28px -10px rgba(0,0,0,.55)}
  .backapp svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2.2}
  @media (max-width:640px){.wrap{padding:24px 14px 60px}.hero{padding:26px 20px}.hero h1{font-size:26px}.day .rail{width:62px}.day .move{display:none}}
  @media print{body{background:#fff}.wrap{max-width:none;padding:0}.hero,.day,.note{box-shadow:none}.day{break-inside:avoid}.backapp{display:none!important}@page{margin:14mm}}
</style>
</head>
<body>
  <a class="backapp" href="app.html"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>Voltar ao app</a>
  <div class="wrap" id="wrap"></div>

<script src="dados.js"></script>
<script src="roteiros.js"></script>
<script src="app-shared.js"></script>
<script>
(function(){
  var params=new URLSearchParams(location.search);
  var R=window.ROTEIROS||[];
  var rot=R.find(function(x){return x.id===(params.get('r')||localStorage.getItem('roteiroAtivo'));})||R[0];
  if(!rot){ document.getElementById('wrap').innerHTML='<p>Roteiro não encontrado.</p>'; return; }
  try{ localStorage.setItem('roteiroAtivo', rot.id); }catch(e){}
  var ac=rot.accent||'#0F766E';
  function shade(hex,p){ try{ var n=parseInt(hex.slice(1),16),r=(n>>16)&255,g=(n>>8)&255,b=n&255; var f=p<0?0:255,t=Math.abs(p); r=Math.round((f-r)*t+r);g=Math.round((f-g)*t+g);b=Math.round((f-b)*t+b); return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}catch(e){return hex;} }
  document.documentElement.style.setProperty('--accent',ac);
  document.documentElement.style.setProperty('--accent-d',shade(ac,-0.25));
  try{ document.querySelector('meta[name=theme-color]'); }catch(e){}

  function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  var ICON_PIN='<path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7zM12 9h.01"/>';
  var weeks=(rot.weeks||[]);
  var html='';
  html+='<header class="hero"><div class="flag"><span class="dot"></span>'+esc(rot.regiao||'')+' · roteiro por etapas</div>'
    +'<h1>'+esc(rot.nome)+'</h1>'
    +'<p class="sub">'+esc(rot.tagline||rot.resumo||'')+'</p>'
    +'<div class="facts">'
      +(rot.periodo?'<span class="fact">🗓️ '+esc(rot.periodo)+'</span>':'')
      +(rot.semanas?'<span class="fact">⏱️ '+esc(rot.semanas)+' semanas</span>':'')
      +(rot.distancia_completa?'<span class="fact">🛣️ '+esc(rot.distancia_completa)+'</span>':'')
      +(rot.origem?'<span class="fact">📍 '+esc(rot.origem)+'</span>':'')
    +'</div></header>';
  if(rot.seasonTip&&(rot.seasonTip.h||rot.seasonTip.p)){
    html+='<div class="note"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>'
      +'<div><h4>'+esc(rot.seasonTip.h||'Quando ir')+'</h4><p>'+(rot.seasonTip.p||'')+'</p></div></div>';
  }
  if(!weeks.length){
    html+='<div class="note"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg><div><h4>Sem etapas cadastradas</h4><p>Este roteiro ainda não tem programação por semana. Edite-o no criador para adicionar etapas.</p></div></div>';
  }
  weeks.forEach(function(w,i){
    var chips=[];
    (w.focos||[]).forEach(function(f){ chips.push('<span class="chip">'+esc(Array.isArray(f)?f[0]:f)+'</span>'); });
    var metas=[];
    if(w.km) metas.push('<div><b>Trecho:</b>&nbsp;'+esc(w.km)+'</div>');
    if(w.parque) metas.push('<div><b>Natureza:</b>&nbsp;'+esc(w.parque)+'</div>');
    if(w.comer) metas.push('<div><b>Comer:</b>&nbsp;'+esc(w.comer)+'</div>');
    if(w.pernoite) metas.push('<div><b>Dormir:</b>&nbsp;'+esc(Array.isArray(w.pernoite)?w.pernoite[1]||w.pernoite[0]:w.pernoite)+'</div>');
    if(w.dica) metas.push('<div><b>Dica:</b>&nbsp;'+esc(w.dica)+'</div>');
    var route=(w.from&&w.to)?(esc(w.from)+' → '+esc(w.to)):(w.reg?esc(w.reg):'');
    html+='<article class="day">'
      +'<div class="rail"><span class="dn">ETAPA</span><span class="dnum">'+(w.n||i+1)+'</span>'+(w.datas?'<span class="dwk">'+esc(w.datas)+'</span>':'')+'</div>'
      +'<div class="body">'
        +'<div class="loc"><svg viewBox="0 0 24 24">'+ICON_PIN+'</svg>'+(w.reg?esc(w.reg):esc(w.mes||''))+(w.km?'<span class="move">'+esc(w.km)+'</span>':'')+'</div>'
        +'<h3>'+esc(w.mes||route||('Etapa '+(w.n||i+1)))+'</h3>'
        +(w.desc?'<p>'+w.desc+'</p>':'')
        +(chips.length?'<div class="chips">'+chips.join('')+'</div>':'')
        +(metas.length?'<div class="meta">'+metas.join('')+'</div>':'')
      +'</div></article>';
  });
  html+='<p class="foot">Planejador de Roteiros · <b>'+esc(rot.nome)+'</b> · gerado a partir da programação do roteiro</p>';
  document.getElementById('wrap').innerHTML=html;
  document.title=rot.nome+' · roteiro por etapas';
})();
</script>
</body>
</html>
